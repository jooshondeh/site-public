name: Deploy production site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate source
        run: python3 scripts/validate_site.py .

      - name: Build clean deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          cp index.html 404.html robots.txt sitemap.xml site.webmanifest              CNAME .nojekyll social-preview.png nexgenbinary-logo.png              favicon.ico favicon.svg favicon-16x16.png favicon-32x32.png              favicon-192x192.png favicon-512x512.png apple-touch-icon.png _site/

          cp -R assets book privacy terms .well-known _site/

      - name: Validate deployment artifact
        run: python3 scripts/validate_site.py _site --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
